<div class="modal d-block confirm-modal" tabindex="-1" *ngIf="isOpen">
  <div class="modal-dialog modal-dialog-centered">
    <div class="modal-content border-0 shadow-lg">
      <div class="modal-header bg-danger text-white border-0">
        <h5 class="modal-title m-0 fw-bold"><i class="fas fa-exclamation-triangle me-2"></i>{{ title }}</h5>
        <button type="button" class="btn-close btn-close-white header-close-btn" (click)="onCancel()"></button>
      </div>
      <div class="modal-body p-4 text-center">
        <p class="mb-0 modal-message">{{ message }}</p>
      </div>
      <div class="modal-footer border-0 d-flex justify-content-center bg-light">
        <button type="button" class="btn btn-secondary px-4 mx-2 fw-bold" (click)="onCancel()">Cancelar</button>
        <button type="button" class="btn btn-danger px-4 mx-2 fw-bold" (click)="onConfirm()">Sí, Eliminar</button>
      </div>
    </div>
  </div>
</div>
