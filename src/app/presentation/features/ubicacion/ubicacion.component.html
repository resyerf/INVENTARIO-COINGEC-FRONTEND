<div *ngIf="isListView" class="ubicacion-container">
  <div class="ubicacion-header mb-5">
    <h1 class="display-4 fw-bold">Ubicaciones</h1>
  </div>

  <div class="d-flex justify-content-between align-items-center mb-4">
    <h3 class="m-0 fw-bold text-primary">Registros de Ubicación</h3>
    <button class="btn btn-primary" (click)="toggleView()"><i class="fas fa-plus me-2"></i>Registrar Nueva Ubicación</button>
  </div>

  <div class="table-responsive">
    <table class="table table-hover table-striped">
      <thead>
        <tr>
          <th>ID</th>
          <th>Nombre</th>
        </tr>
      </thead>
      <tbody>
        <tr *ngFor="let u of ubicaciones">
          <td>{{ u.id }}</td>
          <td>{{ u.nombre }}</td>
        </tr>
        <tr *ngIf="ubicaciones.length === 0">
          <td colspan="2" class="text-center text-muted py-4">No hay ubicaciones registradas.</td>
        </tr>
      </tbody>
    </table>
  </div>
</div>

<div *ngIf="!isListView">
  <div class="card shadow-sm">
    <div class="card-header bg-gradient-primary d-flex justify-content-between align-items-center">
      <h6 class="m-0 fw-bold text-white">Registrar Nueva Ubicación</h6>
      <button class="btn btn-sm btn-light" (click)="toggleView()"><i class="fas fa-arrow-left me-2"></i>Volver a la Lista</button>
    </div>

    <div class="card-body">
      <div *ngIf="statusMessage" class="alert" [ngClass]="statusError ? 'alert-danger' : 'alert-success'">
        {{ statusMessage }}
      </div>

      <div class="row">
        <div class="col-md-6">
          <div class="form-group">
            <label for="nombre">Nombre</label>
            <input class="form-control" id="nombre" [(ngModel)]="ubicacionForm.nombre" />
          </div>
          <div class="form-group">
            <label for="descripcion">Descripción</label>
            <textarea class="form-control" id="descripcion" rows="3" [(ngModel)]="ubicacionForm.descripcion"></textarea>
          </div>
        </div>
      </div>
      <button class="btn btn-primary mt-3" (click)="createUbicacion()">Crear Ubicación</button>
    </div>
  </div>
</div>
