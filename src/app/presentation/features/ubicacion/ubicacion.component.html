<div class="ubicacion-container">
  <div class="ubicacion-header mb-5">
    <h1 class="display-4 fw-bold">Ubicaciones</h1>
  </div>

  <div class="d-flex justify-content-between align-items-center mb-4">
    <h3 class="m-0 fw-bold text-primary">Registros de Ubicación</h3>
    <button class="btn btn-primary" (click)="toggleView()"><i class="fas fa-plus me-2"></i>Registrar Nueva
      Ubicación</button>
  </div>

  <div class="table-responsive">
    <table class="table table-hover table-striped">
      <thead>
        <tr>
          <th>Estado</th>
          <th>ID</th>
          <th>Nombre</th>
          <th class="text-end">Acciones</th>
        </tr>
      </thead>
      <tbody>
        <tr *ngFor="let u of ubicaciones">
          <td><span class="badge" [ngClass]="u.isActive ? 'bg-success' : 'bg-secondary'">
              {{ u.isActive ? 'Activo' : 'Inactivo' }}
            </span></td>
          <td>{{ u.id }}</td>
          <td>{{ u.nombre }}</td>
          <td class="text-end">
            <button *ngIf="u.isActive" class="btn btn-sm btn-outline-danger" (click)="confirmDelete(u.id)"
              title="Eliminar"><i class="fas fa-trash"></i></button>
          </td>
        </tr>
        <tr *ngIf="ubicaciones.length === 0">
          <td colspan="3" class="text-center text-muted py-4">No hay ubicaciones registradas.</td>
        </tr>
      </tbody>
    </table>
  </div>
</div>

<div class="modal d-block" tabindex="-1" style="background-color: rgba(0,0,0,0.5);" *ngIf="!isListView">
  <div class="modal-dialog modal-lg modal-dialog-centered">
    <div class="modal-content border-0 shadow-lg">
      <div class="modal-header bg-gradient-primary text-white border-0">
        <h5 class="modal-title m-0 fw-bold"><i class="fas fa-plus-circle me-2"></i>Registrar Nueva Ubicación</h5>
        <button type="button" class="btn-close btn-close-white" style="filter: invert(1);"
          (click)="toggleView()"></button>
      </div>

      <div class="modal-body p-4">
        <div *ngIf="statusMessage" class="alert" [ngClass]="statusError ? 'alert-danger' : 'alert-success'">
          {{ statusMessage }}
        </div>

        <form [formGroup]="form" (ngSubmit)="createUbicacion()">
          <div class="row">
            <div class="col-md-6">
              <div class="form-group">
                <label for="nombre">Nombre<span class="text-danger">*</span></label>
                <input class="form-control"
                  [class.is-invalid]="form.get('nombre')?.invalid && form.get('nombre')?.touched" id="nombre"
                  formControlName="nombre" />
                <div class="invalid-feedback">El nombre es requerido</div>
              </div>
              <div class="form-group">
                <label for="descripcion">Descripción</label>
                <textarea class="form-control" id="descripcion" rows="3" formControlName="descripcion"></textarea>
              </div>
            </div>
          </div>
          <button type="submit" class="btn btn-primary mt-3 w-100" [disabled]="form.invalid">Crear Ubicación</button>
        </form>
      </div>
    </div>
  </div>
</div>

<app-confirm-modal [isOpen]="!!itemToDelete" (confirm)="executeDelete()" (cancel)="cancelDelete()">
</app-confirm-modal>
