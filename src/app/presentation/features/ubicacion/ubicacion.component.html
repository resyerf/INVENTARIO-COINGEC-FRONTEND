<div *ngIf="isListView" class="ubicacion-container">
  <div class="ubicacion-header">
    <h1>Ubicaciones</h1>
  </div>

  <div class="d-flex justify-content-between align-items-center mb-4">
    <h3 class="m-0 font-weight-bold text-primary">Registros de Ubicación</h3>
    <button class="submit" (click)="toggleView()"><i class="fas fa-plus mr-2"></i>Registrar Nueva Ubicación</button>
  </div>

  <div class="table-responsive">
    <table class="table table-bordered" width="100%" cellspacing="0">
      <thead>
        <tr>
          <th>ID</th>
          <th>Nombre</th>
        </tr>
      </thead>
      <tbody>
        <tr *ngFor="let u of ubicaciones">
          <td>{{ u.id }}</td>
          <td>{{ u.nombre }}</td>
        </tr>
        <tr *ngIf="ubicaciones.length === 0">
          <td colspan="2" class="text-center">No hay ubicaciones registradas.</td>
        </tr>
      </tbody>
    </table>
  </div>
</div>

<div *ngIf="!isListView">
  <div class="d-flex justify-content-between align-items-center mb-4">
    <h6 class="m-0 font-weight-bold text-primary">Detalle de Registro</h6>
    <button class="btn btn-secondary" (click)="toggleView()" style="border: 1px solid #858796; background: white; color: #858796; padding: 0.375rem 0.75rem; border-radius: 0.35rem; cursor:pointer;"><i class="fas fa-arrow-left mr-2"></i>Volver a la Lista</button>
  </div>

  <div *ngIf="statusMessage">
    <p [ngClass]="statusError ? 'error' : 'success'">{{ statusMessage }}</p>
  </div>

  <div class="row">
    <div class="col-md-6">
      <label>Nombre<input [(ngModel)]="ubicacionForm.nombre" /></label>
      <label>Descripción<textarea rows="2" [(ngModel)]="ubicacionForm.descripcion"></textarea></label>
    </div>
  </div>
  <button class="submit mt-3" (click)="createUbicacion()">Crear Ubicación</button>
</div>
