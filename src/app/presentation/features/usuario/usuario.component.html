<div class="usuario-container">
  <div class="usuario-header mb-5">
    <h1 class="display-4 fw-bold">Usuarios</h1>
  </div>

  <div class="d-flex justify-content-between align-items-center mb-4">
    <h3 class="m-0 fw-bold text-primary">Registros de Usuarios</h3>
    <button class="btn btn-primary" (click)="toggleView()"><i class="fas fa-plus me-2"></i>Registrar Nuevo Usuario</button>
  </div>

  <div class="table-responsive">
    <table class="table table-hover table-striped">
      <thead>
        <tr>
          <th>Nombre Completo</th>
          <th>Email</th>
          <th>Área</th>
          <th>Cargo</th>
        </tr>
      </thead>
      <tbody>
        <tr *ngFor="let u of usuarios">
          <td>{{ u.nombreCompleto }}</td>
          <td>{{ u.email }}</td>
          <td>{{ u.area }}</td>
          <td>{{ u.cargo }}</td>
        </tr>
        <tr *ngIf="usuarios.length === 0">
          <td colspan="4" class="text-center text-muted py-4">No hay usuarios registrados.</td>
        </tr>
      </tbody>
    </table>
  </div>
</div>

<div class="modal d-block" tabindex="-1" style="background-color: rgba(0,0,0,0.5);" *ngIf="!isListView">
  <div class="modal-dialog modal-lg modal-dialog-centered">
    <div class="modal-content border-0 shadow-lg">
      <div class="modal-header bg-gradient-primary text-white border-0">
        <h5 class="modal-title m-0 fw-bold"><i class="fas fa-plus-circle me-2"></i>Registrar Nuevo Usuario</h5>
        <button type="button" class="btn-close btn-close-white" style="filter: invert(1);" (click)="toggleView()"></button>
      </div>

      <div class="modal-body p-4">
      <div *ngIf="statusMessage" class="alert" [ngClass]="statusError ? 'alert-danger' : 'alert-success'">
        {{ statusMessage }}
      </div>

      <div class="row">
        <div class="col-md-6">
          <div class="form-group">
            <label for="nombreCompleto">Nombre Completo</label>
            <input class="form-control" id="nombreCompleto" [(ngModel)]="usuarioForm.nombreCompleto" />
          </div>
          <div class="form-group">
            <label for="documentoIdentidad">Documento Identidad</label>
            <input class="form-control" id="documentoIdentidad" [(ngModel)]="usuarioForm.documentoIdentidad" />
          </div>
          <div class="form-group">
            <label for="email">Email</label>
            <input class="form-control" type="email" id="email" [(ngModel)]="usuarioForm.email" />
          </div>
        </div>
        <div class="col-md-6">
          <div class="form-group">
            <label for="area">Área</label>
            <input class="form-control" id="area" [(ngModel)]="usuarioForm.area" />
          </div>
          <div class="form-group">
            <label for="cargo">Cargo</label>
            <input class="form-control" id="cargo" [(ngModel)]="usuarioForm.cargo" />
          </div>
          <div class="form-group">
            <label for="sede">Sede</label>
            <input class="form-control" id="sede" [(ngModel)]="usuarioForm.sede" />
          </div>
        </div>
      </div>
        <button class="btn btn-primary mt-3 w-100" (click)="createUsuario()">Crear Usuario</button>
      </div>
    </div>
  </div>
</div>
