<div class="categoria-container">
  <div class="categoria-header mb-5">
    <h1 class="display-4 fw-bold">Categorías</h1>
  </div>
  <div class="d-flex justify-content-between align-items-center mb-4">
    <h3 class="m-0 fw-bold text-primary">Registros de Categorías</h3>
    <button class="btn btn-primary" (click)="toggleView()"><i class="fas fa-plus me-2"></i>Registrar Nueva
      Categoría</button>
  </div>

  <div class="table-responsive">
    <table class="table table-hover table-striped">
      <thead>
        <tr>
          <th>Código</th>
          <th>Descripción</th>
          <th>Ubicación</th>
        </tr>
      </thead>
      <tbody>
        <tr *ngFor="let c of categorias">
          <td>{{ c.codigo }}</td>
          <td>{{ c.descripcion }}</td>
          <td>{{ c.ubicacionDescripcion || c.ubicacion }}</td>
        </tr>
        <tr *ngIf="categorias.length === 0">
          <td colspan="3" class="text-center text-muted py-4">No hay categorías registradas.</td>
        </tr>
      </tbody>
    </table>
  </div>
</div>

<div class="modal d-block" tabindex="-1" style="background-color: rgba(0,0,0,0.5);" *ngIf="!isListView">
  <div class="modal-dialog modal-lg modal-dialog-centered">
    <div class="modal-content border-0 shadow-lg">
      <div class="modal-header bg-gradient-primary text-white border-0">
        <h5 class="modal-title m-0 fw-bold"><i class="fas fa-plus-circle me-2"></i>Registrar Nueva Categoría</h5>
        <button type="button" class="btn-close btn-close-white" style="filter: invert(1);"
          (click)="toggleView()"></button>
      </div>

      <div class="modal-body p-4">
        <div *ngIf="statusMessage" class="alert" [ngClass]="statusError ? 'alert-danger' : 'alert-success'">
          {{ statusMessage }}
        </div>

        <div class="row">
          <div class="col-md-6">
            <div class="form-group">
              <label for="codigo">Código</label>
              <input class="form-control" id="codigo" [(ngModel)]="categoriaForm.codigo" />
            </div>
            <div class="form-group">
              <label for="descripcion">Descripción</label>
              <textarea class="form-control" id="descripcion" rows="3"
                [(ngModel)]="categoriaForm.descripcion"></textarea>
            </div>
          </div>
          <div class="col-md-6">
            <div class="form-group">
              <app-autocomplete-select label="Ubicación" placeholder="Buscar ubicación..." [required]="true"
                [searchFn]="searchUbicaciones"
                (selectedIdChange)="categoriaForm.ubicacionId = $event || ''"></app-autocomplete-select>
            </div>
          </div>
        </div>

        <button class="btn btn-primary mt-3 w-100" (click)="createCategoria()">Crear Categoría</button>
      </div>
    </div>
  </div>
</div>
