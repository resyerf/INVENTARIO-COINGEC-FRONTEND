<div *ngIf="isListView" class="finalizar-container">
  <div class="finalizar-header mb-5">
    <h1 class="display-4 fw-bold">Finalizar Asignación</h1>
  </div>
  <div class="d-flex justify-content-between align-items-center mb-4">
    <h3 class="m-0 fw-bold text-primary">Asignaciones Activas</h3>
    <button class="btn btn-primary" (click)="toggleView()"><i class="fas fa-check me-2"></i>Finalizar por ID</button>
  </div>

  <div class="table-responsive">
    <table class="table table-hover table-striped">
      <thead>
        <tr>
          <th>Activo Nombre</th>
          <th>Activo Serie</th>
          <th>Fecha Asignacion</th>
          <th>Acción</th>
        </tr>
      </thead>
      <tbody>
        <tr *ngFor="let a of asignaciones">
          <td>{{ a.activoNombre }}</td>
          <td>{{ a.activoSerie }}</td>
          <td>{{ a.fechaAsignacion | date:'mediumDate' }}</td>
          <td>
            <button class="btn btn-sm btn-warning" (click)="toggleView(a.id)"><i class="fas fa-check me-1"></i>Finalizar</button>
          </td>
        </tr>
        <tr *ngIf="asignaciones.length === 0">
          <td colspan="4" class="text-center text-muted py-4">No hay asignaciones pendientes.</td>
        </tr>
      </tbody>
    </table>
  </div>
</div>

<div *ngIf="!isListView">
  <div class="card shadow-sm">
    <div class="card-header bg-gradient-primary d-flex justify-content-between align-items-center">
      <h6 class="m-0 fw-bold text-white">Finalizar Asignación</h6>
      <button class="btn btn-sm btn-light" (click)="toggleView()"><i class="fas fa-arrow-left me-2"></i>Volver a la Lista</button>
    </div>

    <div class="card-body">
      <div *ngIf="statusMessage" class="alert" [ngClass]="statusError ? 'alert-danger' : 'alert-success'">
        {{ statusMessage }}
      </div>

      <div class="row">
        <div class="col-md-6">
          <div class="form-group">
            <label for="asignacionId">ID Asignación</label>
            <input class="form-control" id="asignacionId" [(ngModel)]="asignacionId" />
          </div>
          <div class="form-group">
            <label for="estadoRecibido">Estado Recibido</label>
            <input class="form-control" id="estadoRecibido" [(ngModel)]="finalizarForm.estadoRecibido" placeholder="Ej. Bueno, Roto..." />
          </div>
          <div class="form-group">
            <label for="observaciones">Observaciones</label>
            <textarea class="form-control" id="observaciones" rows="3" [(ngModel)]="finalizarForm.observaciones"></textarea>
          </div>
        </div>
      </div>
      <button class="btn btn-primary mt-3" (click)="finalizeAsignacion()"><i class="fas fa-save me-2"></i>Ejecutar Cierre</button>
    </div>
  </div>
</div>
