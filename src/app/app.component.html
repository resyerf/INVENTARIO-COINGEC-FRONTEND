<div id="wrapper">
  <!-- Sidebar -->
  <ul class="sidebar" [class.collapsed]="sidebarCollapsed">
    <!-- Sidebar - Brand -->
    <a class="sidebar-brand" href="#">
      <div class="sidebar-brand-icon">
        <img src="assets/coingec-logo.png" alt="COINGEC" class="logo-img" 
             onerror="this.src='assets/coingec-placeholder.svg'">
      </div>
      <div class="sidebar-brand-text" *ngIf="!sidebarCollapsed">COINGEC</div>
    </a>

    <!-- Divider -->
    <hr class="sidebar-divider">

    <!-- Nav Items -->
    <li class="nav-item" [class.active]="selectedPanel === 'dashboard'">
      <button class="nav-link" (click)="selectPanel('dashboard')">
        <i class="fas fa-fw fa-chart-line"></i>
        <span *ngIf="!sidebarCollapsed">Dashboard</span>
      </button>
    </li>

    <hr class="sidebar-divider">

    <li class="nav-item" [class.active]="selectedPanel === 'activo'">
      <button class="nav-link" (click)="selectPanel('activo')">
        <i class="fas fa-fw fa-box"></i>
        <span *ngIf="!sidebarCollapsed">Activo</span>
      </button>
    </li>
    
    <li class="nav-item" [class.active]="selectedPanel === 'categoria'">
      <button class="nav-link" (click)="selectPanel('categoria')">
        <i class="fas fa-fw fa-tags"></i>
        <span *ngIf="!sidebarCollapsed">Categoría</span>
      </button>
    </li>
    
    <li class="nav-item" [class.active]="selectedPanel === 'subcategoria'">
      <button class="nav-link" (click)="selectPanel('subcategoria')">
        <i class="fas fa-fw fa-tag"></i>
        <span *ngIf="!sidebarCollapsed">Subcategoría</span>
      </button>
    </li>
    
    <li class="nav-item" [class.active]="selectedPanel === 'ubicacion'">
      <button class="nav-link" (click)="selectPanel('ubicacion')">
        <i class="fas fa-fw fa-map-marker-alt"></i>
        <span *ngIf="!sidebarCollapsed">Ubicación</span>
      </button>
    </li>
    
    <li class="nav-item" [class.active]="selectedPanel === 'usuario'">
      <button class="nav-link" (click)="selectPanel('usuario')">
        <i class="fas fa-fw fa-user"></i>
        <span *ngIf="!sidebarCollapsed">Usuario</span>
      </button>
    </li>
    
    <li class="nav-item" [class.active]="selectedPanel === 'asignacion'">
      <button class="nav-link" (click)="selectPanel('asignacion')">
        <i class="fas fa-fw fa-exchange-alt"></i>
        <span *ngIf="!sidebarCollapsed">Asignación</span>
      </button>
    </li>
    
    <li class="nav-item" [class.active]="selectedPanel === 'finalizar'">
      <button class="nav-link" (click)="selectPanel('finalizar')">
        <i class="fas fa-fw fa-check-circle"></i>
        <span *ngIf="!sidebarCollapsed">Finalizar Asignación</span>
      </button>
    </li>
  </ul>
  <!-- End of Sidebar -->

  <!-- Content Wrapper -->
  <div id="content-wrapper" [class.sidebar-collapsed]="sidebarCollapsed">
    <!-- Main Content -->
    <div id="content">
      <!-- Topbar -->
      <nav class="topbar">
        <!-- Sidebar Toggler Button -->
        <button class="sidebar-toggle-btn" (click)="toggleSidebar()">
          <i class="fas" [ngClass]="sidebarCollapsed ? 'fa-bars' : 'fa-times'"></i>
        </button>

        <!-- Topbar Search -->
        <div class="topbar-search">
          <!-- <input type="text" class="form-control" placeholder="Search for..." style="margin-bottom: 0;">
          <button class="btn" type="button">
            <i class="fas fa-search"></i>
          </button> -->
        </div>

        <!-- Topbar Navbar / User Information -->
        <div class="profile-dropdown">
          <span class="mr-2 text-gray-800">Admin COINGEC</span>
          <i class="fas fa-user-circle fa-2x text-gray-400"></i>
        </div>
      </nav>
      <!-- End of Topbar -->

      <!-- Begin Page Content -->
      <div class="container-fluid">
        <!-- Dashboard Component -->
        <app-dashboard *ngIf="selectedPanel === 'dashboard'" class="page-container"></app-dashboard>

        <!-- Form Panels Container -->
        <div *ngIf="selectedPanel !== 'dashboard'" class="form-container">
          <div class="form-header">
            <h1 class="form-title">{{ selectedPanel | titlecase }}</h1>
            <p class="form-subtitle">Gestión de {{ selectedPanel | titlecase }}</p>
          </div>

          <div class="form-card shadow">
            <div class="form-card-body">
              <app-activo *ngIf="selectedPanel === 'activo'"></app-activo>
              <app-categoria *ngIf="selectedPanel === 'categoria'"></app-categoria>
              <app-subcategoria *ngIf="selectedPanel === 'subcategoria'"></app-subcategoria>
              <app-ubicacion *ngIf="selectedPanel === 'ubicacion'"></app-ubicacion>
              <app-usuario *ngIf="selectedPanel === 'usuario'"></app-usuario>
              <app-asignacion *ngIf="selectedPanel === 'asignacion'"></app-asignacion>
              <app-finalizar-asignacion *ngIf="selectedPanel === 'finalizar'"></app-finalizar-asignacion>
            </div>
          </div>
        </div>
      </div>
      <!-- /.container-fluid -->
    </div>
    <!-- End of Main Content -->
  </div>
  <!-- End of Content Wrapper -->
</div>
